<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Trip</title>

  <!-- APP ICON -->

  <link rel="icon" type="image/png" href="assets/images/smarttrip-logo.png">

  <!-- GOOGLE FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


  <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;

        font-family:'Poppins',sans-serif;
    }


    body{

        background:
        linear-gradient(
            135deg,
            #071018 0%,
            #0f1d2e 100%
        );

    }


    /* =========================================================
       SPLASH SCREEN
    ========================================================= */

    .splash-screen{

        position:relative;

        width:100%;
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        overflow:hidden;
    }


    /* LIGHT EFFECTS */

    .light{

        position:absolute;

        width:500px;
        height:500px;

        border-radius:50%;

        filter:blur(100px);

        opacity:0.22;
    }

    .light-1{

        top:-120px;
        right:-120px;

        background:#c49b63;
    }

    .light-2{

        bottom:-140px;
        left:-120px;

        background:#1f8fff;
    }


    /* CONTENT */

    .splash-content{

        position:relative;

        z-index:2;

        width:100%;

        display:flex;
        flex-direction:column;

        justify-content:center;
        align-items:center;

        text-align:center;

        animation:fadeUp 1.2s ease;
    }


    /* LOGO WRAPPER */

    .logo-wrapper{

        width:200px;
        height:200px;

        display:flex;
        justify-content:center;
        align-items:center;

        border-radius:50%;

        background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.08),
            rgba(255,255,255,0.03)
        );

        backdrop-filter:blur(25px);

        border:1px solid rgba(255,255,255,0.08);

        box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        0 0 60px rgba(196,155,99,0.15);

        animation:float 3s ease-in-out infinite;
    }


    /* LOGO */

    .logo{

        width:130px;
        height:130px;

        object-fit:contain;

        display:block;
    }


    /* TITLE */

    .title{

        margin-top:38px;

        color:#f8f4ee;

        font-size:62px;
        font-weight:800;

        letter-spacing:-2px;
    }

    .title span{
        color:#c49b63;
    }


    /* SUBTITLE */

    .subtitle{

        margin-top:14px;

        color:#b6c0ca;

        font-size:18px;

        letter-spacing:1px;
    }


    /* LOADER */

    .loader{

        width:70px;
        height:70px;

        margin-top:42px;

        border-radius:50%;

        border:4px solid rgba(255,255,255,0.08);

        border-top:4px solid #c49b63;

        animation:spin 1s linear infinite;
    }


    /* ANIMATIONS */

    @keyframes spin{

        100%{
            transform:rotate(360deg);
        }

    }


    @keyframes fadeUp{

        from{
            opacity:0;
            transform:translateY(40px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }

    }


    @keyframes float{

        0%,100%{
            transform:translateY(0px);
        }

        50%{
            transform:translateY(-10px);
        }

    }


    /* MOBILE */

    @media(max-width:768px){

        .logo-wrapper{

            width:160px;
            height:160px;

        }

        .logo{

            width:100px;
            height:100px;

        }

        .title{

            font-size:44px;

        }

        .subtitle{

            font-size:15px;

        }

    }

  </style>

</head>

<body>


<!-- SPLASH SCREEN -->

<section class="splash-screen">


  <!-- LIGHTS -->

  <div class="light light-1"></div>

  <div class="light light-2"></div>


  <!-- CONTENT -->

  <div class="splash-content">


    <!-- LOGO -->

    <div class="logo-wrapper">

      <img
        src="assets/images/smarttrip-logo.png"
        alt="Smart Trip Logo"
        class="logo"
      >

    </div>


    <!-- TITLE -->

    <h1 class="title">

      Smart <span>Trip</span>

    </h1>


    <!-- SUBTITLE -->

    <p class="subtitle">

      Explore India Differently

    </p>


    <!-- LOADER -->

    <div class="loader"></div>

  </div>

</section>



<script>

setTimeout(() => {

    window.location.href = "login.html";

}, 3000);

</script>

</body>
</html>
